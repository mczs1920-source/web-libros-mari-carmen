<!DOCTYPE html>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #F8F6F5;
  color: #4B3A52;
  line-height: 1.6;
}

header {
  background: linear-gradient(135deg, #BEA1C6, #E8DBDA);
  color: white;
  text-align: center;
  padding: 60px 20px 40px;
}

header h1 { margin: 0 0 12px; font-size: 42px; }

header p {
  max-width: 820px;
  margin: 0 auto;
  font-size: 20px;
}

.cta, .cta-top, .cta-button {
  display: inline-block;
  margin-top: 24px;
  background: #25D366;
  color: white;
  text-decoration: none;
  padding: 14px 24px;
  border-radius: 12px;
  font-weight: bold;
  border: none;
  cursor: pointer;
  font-size: 16px;
}

.section {
  max-width: 1150px;
  margin: 0 auto;
  padding: 55px 20px;
}

.section h2 {
  text-align: center;
  color: #7B5A8E;
  font-size: 34px;
  margin: 0 0 12px;
}

.section-intro {
  text-align: center;
  max-width: 860px;
  margin: 0 auto 35px;
  font-size: 18px;
}

.emotion-box {
  background: white;
  border-left: 6px solid #BEA1C6;
  padding: 28px;
  border-radius: 18px;
  box-shadow: 0 6px 18px rgba(75, 58, 82, 0.08);
  margin-top: 20px;
}

.book-open-note {
  text-align: center;
  color: #7B5A8E;
  font-style: italic;
  margin-top: -8px;
  margin-bottom: 25px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 24px;
}

.card {
  background: white;
  border-radius: 20px;
  padding: 24px;
  box-shadow: 0 6px 18px rgba(75,58,82,0.10);
  text-align: center;
  transition: transform 0.35s ease, box-shadow 0.35s ease;
  transform-style: preserve-3d;
  perspective: 1000px;
}

.card:hover {
  transform: translateY(-8px) rotateX(3deg) rotateY(-3deg);
  box-shadow: 0 16px 34px rgba(75,58,82,0.18);
}

.cover {
  width: 100%;
  height: 320px;
  object-fit: cover;
  border-radius: 16px;
  background: #E8DBDA;
  margin-bottom: 18px;
}

.services {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  margin-top: 30px;
}

.service {
  background: white;
  border-radius: 18px;
  padding: 22px;
  box-shadow: 0 6px 18px rgba(75, 58, 82, 0.08);
  text-align: center;
}

.price-box {
  background: #7B5A8E;
  color: white;
  border-radius: 22px;
  padding: 35px 25px;
  text-align: center;
}

.form-box {
  background: white;
  border-radius: 22px;
  padding: 28px;
  max-width: 760px;
  margin: 0 auto;
}

.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.form-box input,
.form-box select,
.form-box textarea {
  width: 100%;
  padding: 13px;
  border-radius: 12px;
  margin-bottom: 14px;
}

.cta-final {
  background: linear-gradient(135deg, #4B3A52, #7B5A8E);
  color: white;
  text-align: center;
  padding: 55px 20px;
}

footer {
  text-align: center;
  padding: 22px;
  font-size: 14px;
}
</style>
</head>

<body>
